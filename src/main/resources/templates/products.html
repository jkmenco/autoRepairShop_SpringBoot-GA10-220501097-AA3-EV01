<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
	<h2>Product list</h2>

	<form th:action="@{/products/add}" method="post" style="text-align:center; margin-bottom:20px;">
	    <input type="text" name="name" placeholder="Product name" required>
	    <input type="number" step="0.01" name="price" placeholder="Price" required>
	    <button type="submit">Add</button>
	</form>

	<table>
	    <thead>
	        <tr>
	            <th>Product</th>
	            <th>Price</th>
	            <th>Actions</th>
	        </tr>
	    </thead>
	    <tbody>
	        <tr th:each="product : ${products}">
	            <td th:text="${product.name}"></td>
	            <td class="price" th:text="'$ ' + ${product.price}"></td>
	            <td>
	                <form th:action="@{/products/update}" method="post" style="display:inline;">
	                    <input type="hidden" name="id" th:value="${product.id}">
	                    <input type="text" name="name" th:value="${product.name}">
	                    <input type="number" step="0.01" name="price" th:value="${product.price}">
	                    <button type="submit">Update</button>
	                </form>
	                <a th:href="@{'/products/delete/' + ${product.id}}" style="color:red;">Delete</a>
	            </td>
	        </tr>
	    </tbody>
	</table>

</body>
</html>
